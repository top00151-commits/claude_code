<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>G. standalone — 로그인 · v5 H5</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
<link href="../ZZ_표준토큰.css" rel="stylesheet" />
<style>
body {
  min-height: 100vh;
  display: grid;
  place-items: center;
  background-image:
    radial-gradient(circle at 15% 20%, rgba(255,229,184,0.45) 0%, transparent 50%),
    radial-gradient(circle at 85% 80%, rgba(212,146,59,0.10) 0%, transparent 55%);
}
.wrap {
  width: 100%;
  max-width: 1080px;
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  background: var(--paper-3);
  border-radius: 28px;
  overflow: hidden;
  box-shadow: 0 30px 80px rgba(184,132,58,0.18), 0 0 0 1px var(--line);
  margin: 40px;
}
.welcome {
  background: linear-gradient(135deg, var(--amber) 0%, #C2693A 100%);
  color: white;
  padding: 56px 52px;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 600px;
}
.welcome::before { content: ""; position: absolute; top: -100px; right: -120px; width: 380px; height: 380px; background: radial-gradient(circle, var(--amber-glow) 0%, transparent 65%); opacity: 0.5; }
.welcome::after { content: ""; position: absolute; bottom: -150px; left: -100px; width: 320px; height: 320px; background: radial-gradient(circle, var(--knk-red) 0%, transparent 65%); opacity: 0.18; }
.welcome-top { position: relative; z-index: 2; }
.welcome-logo { background: white; padding: 12px 18px; border-radius: 14px; display: inline-block; box-shadow: 0 8px 22px rgba(0,0,0,0.15); }
.welcome-logo img { height: 32px; display: block; }
.welcome-vol { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--amber-glow); margin-top: 28px; font-weight: 600; }
.welcome-mid { position: relative; z-index: 2; }
.welcome h1 { font-size: 44px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 14px; }
.welcome h1 em { font-style: normal; color: var(--amber-glow); }
.welcome p { font-size: 15px; line-height: 1.7; color: rgba(255,255,255,0.88); max-width: 380px; }
.welcome-bottom { position: relative; z-index: 2; display: flex; gap: 18px; padding-top: 28px; border-top: 1px solid rgba(255,255,255,0.18); }
.stat { flex: 1; }
.stat-num { font-size: 26px; font-weight: 700; }
.stat-label { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--amber-glow); margin-top: 2px; font-weight: 500; }
.stat-divider { width: 1px; height: 40px; background: rgba(255,255,255,0.2); }

.form-side { padding: 56px 52px; display: flex; flex-direction: column; justify-content: center; }
.form-label-up { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--amber-deep); font-weight: 700; margin-bottom: 12px; }
.form-side h2 { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; color: var(--ink); margin-bottom: 8px; }
.form-side .sub { font-size: 14px; color: var(--mute); margin-bottom: 32px; line-height: 1.6; }

.field { margin-bottom: 18px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: var(--ink); margin-bottom: 7px; }
.field input { width: 100%; padding: 14px 16px; font-size: 14px; font-family: inherit; color: var(--ink); background: var(--paper); border: 1px solid var(--line); border-radius: 14px; transition: all 0.2s; }
.field input:focus { outline: none; border-color: var(--amber); background: white; box-shadow: 0 0 0 4px var(--amber-glow); }

.field-row { display: flex; justify-content: space-between; align-items: center; margin: 12px 0 24px; }
.check { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--mute); cursor: pointer; }
.check input { accent-color: var(--amber); width: 16px; height: 16px; }
.link { font-size: 13px; color: var(--amber-deep); text-decoration: none; font-weight: 600; }

.btn-primary { width: 100%; padding: 15px; background: linear-gradient(135deg, var(--amber) 0%, #C2693A 100%); color: white; border: 0; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 8px 22px rgba(212,146,59,0.32); font-family: inherit; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(212,146,59,0.42); }

.divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--mute); }
.divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--line); }

.btn-secondary { width: 100%; padding: 13px; background: var(--paper); color: var(--ink); border: 1px solid var(--line); border-radius: 14px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 10px; }
.btn-secondary:hover { background: var(--amber-glow); border-color: var(--amber); }

.footer { margin-top: 28px; text-align: center; font-size: 12px; color: var(--mute); }
.footer b { color: var(--knk-red); }
</style>
</head>
<body>
<div class="wrap">
  <div class="welcome">
    <div class="welcome-top">
      <div class="welcome-logo">
        <img src="../../../../../01_HAIST_WORKS/static/logo.png" alt="KNK" />
      </div>
      <div class="welcome-vol">HAIST WORKS · v5 H5 · 2026</div>
    </div>
    <div class="welcome-mid">
      <h1>오늘도, <em>따뜻하게</em><br>일을 시작합니다</h1>
      <p>케이엔케이 통합 업무 플랫폼.<br>김 부장님께 빅터 AI 가 오늘의 견적·발주·재고 알림을 준비해두었습니다.</p>
    </div>
    <div class="welcome-bottom">
      <div class="stat"><div class="stat-num">23</div><div class="stat-label">견적 진행</div></div>
      <div class="stat-divider"></div>
      <div class="stat"><div class="stat-num">8</div><div class="stat-label">발주 대기</div></div>
      <div class="stat-divider"></div>
      <div class="stat"><div class="stat-num">3</div><div class="stat-label">재고 경고</div></div>
    </div>
  </div>

  <div class="form-side">
    <div class="form-label-up">SIGN IN</div>
    <h2>반갑습니다</h2>
    <p class="sub">사번 또는 이메일로 로그인해주세요.<br>처음이시라면 시스템 관리자에게 문의 부탁드립니다.</p>

    <div class="field">
      <label>사번 / 이메일</label>
      <input type="text" placeholder="knk2024 또는 name@knk.co.kr" value="knk2024" />
    </div>
    <div class="field">
      <label>비밀번호</label>
      <input type="password" placeholder="비밀번호 입력" value="••••••••" />
    </div>

    <div class="field-row">
      <label class="check">
        <input type="checkbox" checked /> 이 기기에서 로그인 유지
      </label>
      <a class="link" href="#">비밀번호 찾기 →</a>
    </div>

    <button class="btn-primary">로그인 →</button>

    <div class="divider">또는</div>

    <button class="btn-secondary">🔒 SSO 통합 로그인 (사내 인증)</button>

    <div class="footer">
      ㈜케이엔케이 · HAIST Innovation<br>
      문의 <b>02-3142-XXXX</b> · helpdesk@knk.co.kr
    </div>
  </div>
</div>
</body>
</html>
