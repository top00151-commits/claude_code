<!DOCTYPE html>
<html lang="{{ lang|default('ko') }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}매출흐름 · 물류 — {{ app_name|default('HAIST WORKS') }}{% endblock %}</title>
<link rel="stylesheet" href="/static/style.css?v=20260415logi1">
</head>
<body class="logi-body">

{% if user %}
<header class="topbar topbar-logi">
  <div class="tb-left">
    <a href="/logistics" class="tb-brand">
      <span class="tb-logo">KNK</span>
      <span class="tb-title-group">
        <span class="tb-title">매출흐름 · 물류</span>
        <span class="tb-subtitle">HAIST WORKS · Supply Chain</span>
      </span>
    </a>
    <span class="tb-badge" style="background:rgba(165,40,44,.18);color:#FCA5A5;border-color:rgba(165,40,44,.4);">권한 제한</span>
  </div>

  <nav class="tb-nav">
    <a href="/logistics" class="tb-nav-item {% if active=='logistics' %}tb-nav-active{% endif %}">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h18v18H3z"/><path d="M3 9h18M9 21V9"/></svg>
      <span>대시보드</span>
    </a>
    <a href="/parts" class="tb-nav-item {% if active=='parts' %}tb-nav-active{% endif %}">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>
      <span>부품</span>
    </a>
    <a href="/projects" class="tb-nav-item {% if active=='logi_projects' %}tb-nav-active{% endif %}">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      <span>관리코드</span>
    </a>
    <a href="/suppliers" class="tb-nav-item {% if active=='suppliers' %}tb-nav-active{% endif %}">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M5 21V7l7-4 7 4v14"/></svg>
      <span>공급사</span>
    </a>
    <a href="/po" class="tb-nav-item {% if active=='po' %}tb-nav-active{% endif %}">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span>발주</span>
    </a>
    <div class="tb-divider"></div>
    <span class="tb-nav-item tb-nav-muted" title="4단계">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M5 12l7 7 7-7"/><path d="M5 21h14"/></svg>
      <span>입고</span>
    </span>
    <span class="tb-nav-item tb-nav-muted" title="5단계">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7 12 3 4 7l8 4 8-4z"/><path d="M4 7v10l8 4 8-4V7"/></svg>
      <span>재고</span>
    </span>
  </nav>

  <div class="tb-right">
    <a href="/home" target="_blank" rel="noopener" class="tb-home-link" title="HAIST WORKS 메인 창 열기">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>HAIST WORKS</span>
    </a>
    <a href="/profile" class="tb-user-chip" title="내 계정">
      <div class="tb-avatar">{{ user.name[:1] }}</div>
      <div class="tb-user-info">
        <div class="tb-user-name">{{ user.name }}</div>
        <div class="tb-user-role">{{ user.rank or user.team_name or '-' }}</div>
      </div>
    </a>
    <a href="/logout" class="logout" title="로그아웃">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </a>
  </div>
</header>
{% endif %}

<main class="logi-main">
{% block body %}{% endblock %}
</main>

<footer class="footer">
  ㈜케이엔케이 | HAIST Innovation · 매출흐름 물류 시스템 | {{ now|default('') }}
</footer>

</body>
</html>
