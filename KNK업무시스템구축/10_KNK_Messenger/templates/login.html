<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>KNK 메신저 로그인</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="KNK 메신저">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.png') }}">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icons/icon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
  <main class="login-card">
    <div class="brand-mark">KNK</div>
    <h1 class="brand">KNK 메신저</h1>
    <p class="brand-sub">사내 업무 전용</p>
    <form method="post" class="login-form">
      <label>아이디
        <input name="username" autocomplete="username" required autofocus>
      </label>
      <label>비밀번호
        <input name="password" type="password" autocomplete="current-password" required>
      </label>
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
      <button type="submit">로그인</button>
    </form>
    <p class="hint">테스트 계정: <code>kjr</code> / <code>hong</code> / <code>lee</code> · 비밀번호 <code>knk1234</code></p>
  </main>
</body>
</html>
