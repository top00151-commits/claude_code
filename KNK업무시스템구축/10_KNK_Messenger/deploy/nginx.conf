# ============================================================
# KNK Messenger - Nginx 사이트 설정
# 위치: /etc/nginx/sites-available/knk-messenger (sed로 __DOMAIN__ 치환)
# ============================================================

# HTTP -> HTTPS 리다이렉트는 certbot이 자동으로 추가합니다.
# 이 파일은 초기에 80 포트로 제공되고, certbot 실행 후 443/리다이렉트가 추가됩니다.

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    # 업로드 한도: 메신저는 25MB지만 여유 두고 30MB
    client_max_body_size 30M;

    # 정적 파일은 nginx가 직접 (속도)
    location /static/ {
        alias /opt/knk_messenger/static/;
        expires 1d;
        access_log off;
        add_header Cache-Control "public, max-age=86400";
    }

    # 업로드 파일도 nginx가 직접 (인증은 Flask가 처리하므로 권한 체크 필요시 X-Accel-Redirect 검토)
    # 현재는 Flask 라우트를 통해 권한 검증 후 send_from_directory로 제공 → nginx 직접 서빙은 비활성

    # WebSocket (Socket.IO) 별도 처리
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    # 메인 앱
    location / {
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
        proxy_send_timeout 60;
    }

    # 보안 헤더 (Flask app.py에서도 설정하지만 nginx에서도 한 번 더)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 헬스체크 (UptimeRobot 등에서 ping)
    location = /healthz {
        access_log off;
        proxy_pass http://127.0.0.1:5050/login;
        proxy_set_header Host $host;
    }
}
