{% extends "base_logi.html" %}
{% block title %}재고 실사 조정 — {{ app_name }}{% endblock %}
{% block body %}

<div class="page-head">
  <h1>⚖️ 재고 실사 조정</h1>
  <p class="muted">실사 결과와 시스템 재고의 차이를 조정합니다. 양수(+)는 증가, 음수(-)는 감소.</p>
</div>

<form method="post" action="/stock/adjust" class="card" style="max-width:640px;">
  <div>
    <label style="font-size:12px;font-weight:800;color:var(--ink);display:block;margin-bottom:4px;">부품 <span style="color:var(--knk-red);">*</span></label>
    <select name="part_id" required style="width:100%;padding:10px 12px;border:1px solid var(--line-strong);border-radius:8px;font-size:13px;">
      <option value="">-- 선택 --</option>
      {% for p in parts %}
      <option value="{{ p.id }}" {% if default_part_id and (default_part_id|string)==(p.id|string) %}selected{% endif %}>
        [{{ p.part_no }}] {{ p.part_name }} — 시스템 재고 {{ "%g"|format(p.stock_qty or 0) }}{{ p.unit or 'EA' }}
      </option>
      {% endfor %}
    </select>
  </div>

  <div style="margin-top:14px;">
    <label style="font-size:12px;font-weight:800;color:var(--ink);display:block;margin-bottom:4px;">조정 수량 <span style="color:var(--knk-red);">*</span> <span style="font-weight:500;color:var(--mute);">(+증가 / -감소)</span></label>
    <input type="number" name="quantity" step="0.01" required placeholder="예: -3 (3개 감소) 또는 +5 (5개 증가)"
           style="width:100%;padding:10px 12px;border:2px solid var(--amber);border-radius:8px;font-size:14px;font-family:monospace;font-weight:700;background:#FFFBEB;">
  </div>

  <div style="margin-top:14px;">
    <label style="font-size:12px;font-weight:800;color:var(--ink);display:block;margin-bottom:4px;">조정 사유 <span style="color:var(--knk-red);">*</span></label>
    <input type="text" name="reason" required placeholder="예: 2026-04 월말 실사 차이, 파손 폐기, 분실" style="width:100%;padding:10px 12px;border:1px solid var(--line-strong);border-radius:8px;font-size:13px;">
  </div>

  <div style="margin-top:14px;">
    <label style="font-size:12px;font-weight:800;color:var(--ink);display:block;margin-bottom:4px;">비고</label>
    <textarea name="note" rows="2" style="width:100%;padding:10px 12px;border:1px solid var(--line-strong);border-radius:8px;font-size:13px;font-family:inherit;"></textarea>
  </div>

  <div style="margin-top:14px;padding:12px 16px;background:var(--amber-glow);border-left:3px solid var(--amber);border-radius:6px;font-size:12px;color:var(--amber-deep);">
    ⚠️ 실사 조정은 감사(audit) 추적이 중요합니다. 사유를 명확히 기록하세요.
  </div>

  <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:18px;padding-top:18px;border-top:1px solid var(--line);">
    <a href="/stock/movements" class="btn btn-ghost">취소</a>
    <button type="submit" class="btn" style="background:linear-gradient(135deg,var(--amber),#D97706);color:#fff;border:none;font-weight:800;padding:10px 28px;">
      ✓ 조정 등록
    </button>
  </div>
</form>

{% endblock %}
