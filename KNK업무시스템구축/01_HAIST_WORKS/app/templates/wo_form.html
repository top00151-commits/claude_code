<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/><title>{% if wo %}작업지시 수정{% else %}작업지시 발행{% endif %} · KNK</title>
{% include "_v5_partials/styles.html" %}
<style>
.form-card { margin: 0 var(--content-pad) var(--space-5); background: var(--paper-3); border: 1px solid var(--line); border-radius: var(--radius-xl); padding: var(--space-6); }
.frow { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; margin-bottom: 14px; }
.fld label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
.fld label .req { color: var(--knk-red); }
.fld input, .fld select, .fld textarea { width: 100%; padding: 10px 14px; font-size: 13.5px; border: 1px solid var(--line); border-radius: var(--radius-md); background: var(--paper); color: var(--ink); font-family: inherit; }
.fld textarea { min-height: 80px; resize: vertical; }
.fld.full { grid-column: span 2; }
</style></head><body>
<div class="app">{% set active_tab = 'logi' %}
{% include "_v5_partials/chrome.html" with context %}
<main class="main">
  <div class="page-head">
    <div><div class="crumbs"><a href="/production/work-orders">작업지시</a> · <b>{% if wo %}수정{% else %}발행{% endif %}</b></div>
    <h1 class="page-title">🔨 작업지시 <em>{% if wo %}수정{% else %}발행{% endif %}</em></h1></div>
  </div>

  <form method="post" action="{% if wo %}/production/work-orders/{{ wo.id }}/edit{% else %}/production/work-orders/new{% endif %}" class="form-card">
    <div class="frow">
      <div class="fld"><label>WO 번호</label><input type="text" name="wo_no" value="{{ wo.wo_no|default('') }}" placeholder="자동 생성"></div>
      <div class="fld"><label>관리코드 / 프로젝트 <span class="req">*</span></label>
        <select name="project_id" required>
          <option value="">— 선택 —</option>
          {% for p in projects|default([]) %}<option value="{{ p.id }}" {% if wo and wo.project_id == p.id %}selected{% endif %}>{{ p.mgmt_code|default('') }} {{ p.name }}</option>{% endfor %}
        </select>
      </div>
    </div>
    <div class="frow">
      <div class="fld"><label>제품명 <span class="req">*</span></label><input type="text" name="product_name" required value="{{ wo.product_name|default('') }}"></div>
      <div class="fld"><label>수량 <span class="req">*</span></label><input type="number" name="qty" min="1" required value="{{ wo.qty|default(1) }}"></div>
    </div>
    <div class="frow">
      <div class="fld"><label>담당</label>
        <select name="assignee_id">
          <option value="">— 미배정 —</option>
          {% for u in users|default([]) %}<option value="{{ u.id }}" {% if wo and wo.assignee_id == u.id %}selected{% endif %}>{{ u.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="fld"><label>상태</label>
        <select name="status">
          <option value="PLANNED" {% if not wo or wo.status == 'PLANNED' %}selected{% endif %}>계획</option>
          <option value="IN_PROGRESS" {% if wo and wo.status == 'IN_PROGRESS' %}selected{% endif %}>진행</option>
          <option value="DONE" {% if wo and wo.status == 'DONE' %}selected{% endif %}>완료</option>
          <option value="CANCELLED" {% if wo and wo.status == 'CANCELLED' %}selected{% endif %}>취소</option>
        </select>
      </div>
    </div>
    <div class="frow">
      <div class="fld"><label>시작 예정</label><input type="date" name="start_date" value="{{ wo.start_date|default('') }}"></div>
      <div class="fld"><label>완료 예정</label><input type="date" name="end_date" value="{{ wo.end_date|default('') }}"></div>
    </div>
    <div class="frow">
      <div class="fld full"><label>작업 지시 / 비고</label><textarea name="instructions" placeholder="작업 절차·주의사항·검수 기준">{{ wo.instructions|default('') }}</textarea></div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:10px;">
      <a class="btn btn-secondary" href="/production/work-orders">취소</a>
      <button class="btn btn-primary" type="submit">📤 {% if wo %}저장{% else %}발행{% endif %}</button>
    </div>
  </form>
  <div style="height: var(--space-7);"></div>
</main></div></body></html>
