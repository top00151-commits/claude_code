<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/><title>회사 정보 · KNK</title>
{% include "_v5_partials/styles.html" %}
<style>
.cfg-form { margin: 0 var(--content-pad) var(--space-5); background: var(--paper-3); border: 1px solid var(--line); border-radius: var(--radius-xl); padding: var(--space-6); }
.fld { margin-bottom: 14px; display: grid; grid-template-columns: 200px 1fr; gap: 14px; align-items: center; }
.fld label { font-size: 12px; font-weight: 600; color: var(--ink); }
.fld input { padding: 9px 12px; font-size: 13px; border: 1px solid var(--line); border-radius: var(--radius-md); background: var(--paper); color: var(--ink); font-family: inherit; }
</style></head><body>
<div class="app">{% include "_v5_partials/chrome.html" with context %}
<main class="main">
  <div class="page-head">
    <div><div class="crumbs"><a href="/admin">관리자</a> · <b>회사 정보</b></div><h1 class="page-title">🏢 회사 <em>정보</em></h1>
    <div class="page-meta" style="margin-top:6px;letter-spacing:0;text-transform:none;font-size:12px;color:var(--mute);">법인명 · 사업자번호 · 주소 · 대표 — 견적·발주·세금계산서 발행 시 자동 사용</div></div>
  </div>

  {% if saved %}<div style="margin: 0 var(--content-pad) var(--space-3);background:rgba(122,155,92,.10);border:1px solid var(--success);color:var(--success);padding:10px 14px;border-radius:8px;font-weight:700;">✓ 저장 완료</div>{% endif %}

  <form method="post" action="/admin/company" class="cfg-form">
    {% for k in keys %}
    <div class="fld">
      <label>{{ k.label|default(k.key) }}{% if k.required %} <span style="color:var(--knk-red);">*</span>{% endif %}</label>
      <input type="text" name="{{ k.key }}" value="{{ current.get(k.key, '') }}" {% if k.required %}required{% endif %} placeholder="{{ k.placeholder|default('') }}">
    </div>
    {% endfor %}
    <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:14px;">
      <button class="btn btn-primary" type="submit">💾 저장</button>
    </div>
  </form>
  <div style="height: var(--space-7);"></div>
</main></div></body></html>
