<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/><title>{% if part %}자재 수정{% else %}자재 등록{% endif %} · KNK</title>
{% include "_v5_partials/styles.html" %}
<style>
.form-card { margin: 0 var(--content-pad) var(--space-5); background: var(--paper-3); border: 1px solid var(--line); border-radius: var(--radius-xl); padding: var(--space-6); }
.field-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 14px; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field.full { grid-column: span 2; }
.field label { font-size: 12px; font-weight: 600; }
.field input, .field select, .field textarea { padding: 10px 14px; font-family: inherit; font-size: 13.5px; color: var(--ink); background: var(--paper); border: 1px solid var(--line); border-radius: var(--radius-md); }
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--amber); box-shadow: 0 0 0 3px var(--amber-glow); }
</style></head>
<body>
<div class="app">{% include "_v5_partials/chrome.html" with context %}
<main class="main">
  <div class="page-head">
    <div><div class="crumbs"><a href="/parts">자재 마스터</a> · <b>{% if part %}수정{% else %}등록{% endif %}</b></div>
    <h1 class="page-title">{% if part %}자재 <em>수정</em>{% else %}자재 <em>등록</em>{% endif %}</h1></div>
  </div>
  <form method="post" action="{% if part %}/parts/{{ part.id }}/edit{% else %}/parts/new{% endif %}">
    <div class="form-card">
      <div class="field-row">
        <div class="field"><label>자재 코드 *</label><input type="text" name="code" required value="{{ part.code|default('') }}"></div>
        <div class="field"><label>사업부</label><select name="biz_div"><option value="">— 선택 —</option><option value="M" {% if part and part.biz_div == 'M' %}selected{% endif %}>M (자재)</option><option value="T" {% if part and part.biz_div == 'T' %}selected{% endif %}>T (가공)</option></select></div>
      </div>
      <div class="field-row">
        <div class="field full"><label>자재명 *</label><input type="text" name="name" required value="{{ part.name|default('') }}"></div>
      </div>
      <div class="field-row">
        <div class="field full"><label>사양</label><input type="text" name="spec" value="{{ part.spec|default('') }}" placeholder="규격 / 재질 / 인증"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>분류</label><input type="text" name="category" value="{{ part.category|default('') }}" placeholder="예: 모터·구동부"></div>
        <div class="field"><label>단위</label><input type="text" name="unit" value="{{ part.unit|default('EA') }}" placeholder="EA, m, kg..."></div>
      </div>
      <div class="field-row">
        <div class="field"><label>표준 단가 (원)</label><input type="number" name="unit_price" step="1" value="{{ part.unit_price|default(0) }}"></div>
        <div class="field"><label>안전 재고</label><input type="number" name="safety_stock" step="0.01" value="{{ part.safety_stock|default(0) }}"></div>
      </div>
      <div style="margin-top:10px;font-size:12px;color:var(--mute);"><label><input type="checkbox" name="is_active" value="1" {% if not part or part.is_active %}checked{% endif %}> 활성</label></div>
    </div>
    <div style="margin: 0 var(--content-pad) var(--space-7);display:flex;justify-content:flex-end;gap:10px;">
      <a class="btn btn-secondary" href="/parts">취소</a>
      <button type="submit" class="btn btn-primary">📤 {% if part %}저장{% else %}등록{% endif %}</button>
    </div>
  </form>
</main></div></body></html>
