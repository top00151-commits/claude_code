<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/><title>QC 처리 · KNK</title>
{% include "_v5_partials/styles.html" %}
<style>
.qc-form { margin: 0 var(--content-pad) var(--space-4); background: var(--paper-3); border: 1px solid var(--line); border-radius: var(--radius-xl); padding: var(--space-5); }
.qc-row { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; margin-bottom: 14px; }
.qc-field label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
.qc-field input, .qc-field select, .qc-field textarea { width: 100%; padding: 9px 12px; font-size: 13px; border: 1px solid var(--line); border-radius: var(--radius-md); background: var(--paper); color: var(--ink); font-family: inherit; }
.qc-field textarea { min-height: 80px; resize: vertical; }
.qc-field.full { grid-column: span 2; }
</style></head><body>
<div class="app">{% include "_v5_partials/chrome.html" with context %}
<main class="main">
  <div class="page-head">
    <div><div class="crumbs"><a href="/logistics">자재구매센터</a> · <b>QC 처리</b></div><h1 class="page-title">🔬 QC <em>처리</em></h1>
    <div class="page-meta" style="margin-top:6px;letter-spacing:0;text-transform:none;font-size:12px;color:var(--mute);">{% if mode == 'disposition' %}QC #{{ qc_id }} 처분 결정 (양품/불량/재작업){% else %}입고 후 검사 등록 (PO 항목 #{{ po_item_id }}){% endif %}</div></div>
  </div>

  <form class="qc-form" method="post" action="{% if mode == 'disposition' %}/stock/qc/disposition{% else %}/stock/qc/{{ po_item_id }}{% endif %}">
    {% if mode == 'disposition' %}<input type="hidden" name="qc_id" value="{{ qc_id }}">{% endif %}
    <div class="qc-row">
      <div class="qc-field"><label>판정 *</label>
        <select name="result" required>
          <option value="">— 선택 —</option>
          <option value="PASS">✓ 양품 (PASS)</option>
          <option value="FAIL">✗ 불량 (FAIL)</option>
          <option value="REWORK">↻ 재작업 (REWORK)</option>
        </select>
      </div>
      <div class="qc-field"><label>검사일</label><input type="date" name="inspected_at" value="{{ today|default('') }}"></div>
    </div>
    <div class="qc-row">
      <div class="qc-field"><label>합격 수량</label><input type="number" name="pass_qty" step="0.01" min="0" placeholder="0"></div>
      <div class="qc-field"><label>불량 수량</label><input type="number" name="fail_qty" step="0.01" min="0" placeholder="0"></div>
    </div>
    <div class="qc-row">
      <div class="qc-field full"><label>비고 / 불량 사유</label><textarea name="note" placeholder="검사 결과·특이사항·후속 조치"></textarea></div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:10px;">
      <a class="btn btn-secondary" href="javascript:history.back()">취소</a>
      <button class="btn btn-primary" type="submit">📤 등록</button>
    </div>
  </form>
  <div style="height: var(--space-7);"></div>
</main></div></body></html>
