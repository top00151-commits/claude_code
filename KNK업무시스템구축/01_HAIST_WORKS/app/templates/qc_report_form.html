<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/><title>QC 보고서 작성 · KNK</title>
{% include "_v5_partials/styles.html" %}
<style>
.form-card { margin: 0 var(--content-pad) var(--space-5); background: var(--paper-3); border: 1px solid var(--line); border-radius: var(--radius-xl); padding: var(--space-6); }
.frow { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; margin-bottom: 14px; }
.fld label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
.fld label .req { color: var(--knk-red); }
.fld input, .fld select, .fld textarea { width: 100%; padding: 10px 14px; font-size: 13.5px; border: 1px solid var(--line); border-radius: var(--radius-md); background: var(--paper); color: var(--ink); font-family: inherit; }
.fld textarea { min-height: 80px; resize: vertical; }
.fld.full { grid-column: span 2; }
</style></head><body>
<div class="app">{% include "_v5_partials/chrome.html" with context %}
<main class="main">
  <div class="page-head">
    <div><div class="crumbs"><a href="/qc/reports">QC 보고서</a> · <b>{% if report %}수정{% else %}작성{% endif %}</b></div>
    <h1 class="page-title">🔬 QC 보고서 <em>{% if report %}수정{% else %}작성{% endif %}</em></h1></div>
  </div>

  <form method="post" action="{% if report %}/qc/reports/{{ report.id }}/edit{% else %}/qc/reports/new{% endif %}" class="form-card">
    <div class="frow">
      <div class="fld"><label>보고서 번호</label><input type="text" name="report_no" value="{{ report.report_no|default('') }}" placeholder="자동 생성"></div>
      <div class="fld"><label>검사일 <span class="req">*</span></label><input type="date" name="inspected_at" value="{{ report.inspected_at|default(today|default('')) }}" required></div>
    </div>
    <div class="frow">
      <div class="fld"><label>품목 <span class="req">*</span></label>
        <select name="part_id" required>
          <option value="">— 선택 —</option>
          {% for p in parts|default([]) %}<option value="{{ p.id }}">{{ p.name }}{% if p.spec %} · {{ p.spec }}{% endif %}</option>{% endfor %}
        </select>
      </div>
      <div class="fld"><label>로트 수량 <span class="req">*</span></label><input type="number" name="lot_qty" min="1" required value="{{ report.lot_qty|default(1) }}"></div>
    </div>
    <div class="frow">
      <div class="fld"><label>샘플 수</label><input type="number" name="sample_size" min="1" value="{{ report.sample_size|default('') }}"></div>
      <div class="fld"><label>판정 <span class="req">*</span></label>
        <select name="overall" required>
          <option value="">— 선택 —</option>
          <option value="PASS" {% if report and report.overall == 'PASS' %}selected{% endif %}>✓ PASS</option>
          <option value="FAIL" {% if report and report.overall == 'FAIL' %}selected{% endif %}>✗ FAIL</option>
          <option value="REWORK" {% if report and report.overall == 'REWORK' %}selected{% endif %}>↻ REWORK</option>
          <option value="CONDITIONAL" {% if report and report.overall == 'CONDITIONAL' %}selected{% endif %}>⚠ 조건부</option>
        </select>
      </div>
    </div>
    <div class="frow">
      <div class="fld"><label>합격 수량</label><input type="number" name="pass_qty" min="0" value="{{ report.pass_qty|default('') }}"></div>
      <div class="fld"><label>불량 수량</label><input type="number" name="fail_qty" min="0" value="{{ report.fail_qty|default('') }}"></div>
    </div>
    <div class="frow">
      <div class="fld full"><label>검사 항목 / 결과</label><textarea name="checklist" placeholder="치수·외관·기능 등 검사 항목별 결과">{{ report.checklist|default('') }}</textarea></div>
    </div>
    <div class="frow">
      <div class="fld full"><label>비고 / 불량 사유</label><textarea name="note" placeholder="특이사항·후속 조치">{{ report.note|default('') }}</textarea></div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:10px;">
      <a class="btn btn-secondary" href="/qc/reports">취소</a>
      <button class="btn btn-primary" type="submit">📤 {% if report %}저장{% else %}작성{% endif %}</button>
    </div>
  </form>
  <div style="height: var(--space-7);"></div>
</main></div></body></html>
