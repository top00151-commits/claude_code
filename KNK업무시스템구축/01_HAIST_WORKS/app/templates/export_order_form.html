<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/><title>수출 수주 등록 · KNK</title>
{% include "_v5_partials/styles.html" %}
<style>
.form-card { margin: 0 var(--content-pad) var(--space-5); background: var(--paper-3); border: 1px solid var(--line); border-radius: var(--radius-xl); padding: var(--space-6); }
.frow { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; margin-bottom: 14px; }
.fld label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
.fld label .req { color: var(--knk-red); }
.fld input, .fld select { width: 100%; padding: 10px 14px; font-size: 13.5px; border: 1px solid var(--line); border-radius: var(--radius-md); background: var(--paper); color: var(--ink); font-family: inherit; }
</style></head><body>
<div class="app">{% set active_tab = 'sales' %}
{% include "_v5_partials/chrome.html" with context %}
<main class="main">
  <div class="page-head">
    <div><div class="crumbs"><a href="/export">수출</a> · <b>새 수주</b></div><h1 class="page-title">🚢 수출 <em>수주</em> 등록</h1></div>
  </div>

  <form method="post" action="/export/orders" class="form-card">
    <div class="frow">
      <div class="fld"><label>매출 수주 연결 <span class="req">*</span></label>
        <select name="order_id" required>
          <option value="">— 매출 수주 선택 —</option>
          {% for o in orders %}<option value="{{ o.id }}">{{ o.order_no|default('#' ~ o.id) }} · 고객 {{ o.customer_id }} · {{ '{:,.0f}'.format(o.total_amount|default(0)) }}원 ({{ o.order_date|default('—') }})</option>{% endfor %}
        </select>
      </div>
      <div class="fld"><label>수출번호</label><input type="text" name="export_no" placeholder="자동 생성"></div>
    </div>
    <div class="frow">
      <div class="fld"><label>인코텀즈 <span class="req">*</span></label>
        <select name="incoterms" required>
          <option value="">— 선택 —</option>
          <option>FOB</option><option>CIF</option><option>CFR</option><option>DAP</option><option>DDP</option><option>EXW</option>
        </select>
      </div>
      <div class="fld"><label>통화</label>
        <select name="currency"><option>USD</option><option>EUR</option><option>JPY</option><option>CNY</option><option>KRW</option></select>
      </div>
    </div>
    <div class="frow">
      <div class="fld"><label>도착항 / 도시</label><input type="text" name="destination" placeholder="예: Hamburg, DE"></div>
      <div class="fld"><label>출항 예정일</label><input type="date" name="etd"></div>
    </div>
    <div class="frow">
      <div class="fld"><label>본선명</label><input type="text" name="vessel" placeholder="MS Atlantic"></div>
      <div class="fld"><label>B/L 번호</label><input type="text" name="bl_no"></div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:10px;">
      <a class="btn btn-secondary" href="/export">취소</a>
      <button class="btn btn-primary" type="submit">📤 등록</button>
    </div>
  </form>
  <div style="height: var(--space-7);"></div>
</main></div></body></html>
