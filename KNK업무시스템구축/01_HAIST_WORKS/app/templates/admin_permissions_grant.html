<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/><title>권한 부여 · KNK</title>
{% include "_v5_partials/styles.html" %}
<style>
.form-card { margin: 0 var(--content-pad) var(--space-5); background: var(--paper-3); border: 1px solid var(--line); border-radius: var(--radius-xl); padding: var(--space-6); }
.frow { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; margin-bottom: 14px; }
.fld label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
.fld input, .fld select { width: 100%; padding: 10px 14px; font-size: 13.5px; border: 1px solid var(--line); border-radius: var(--radius-md); background: var(--paper); color: var(--ink); font-family: inherit; }
</style></head><body>
<div class="app">{% include "_v5_partials/chrome.html" with context %}
<main class="main">
  <div class="page-head">
    <div><div class="crumbs"><a href="/admin/permissions">권한</a> · <b>부여</b></div><h1 class="page-title">＋ 권한 <em>부여</em></h1></div>
  </div>

  <form method="post" action="/admin/permissions/grant" class="form-card">
    <div class="frow">
      <div class="fld"><label>사용자 *</label>
        <select name="user_id" required>
          <option value="">— 선택 —</option>
          {% for u_ in users|default([]) %}<option value="{{ u_.id }}">{{ u_.name }} ({{ u_.role|default('member') }})</option>{% endfor %}
        </select>
      </div>
      <div class="fld"><label>권한 *</label>
        <select name="permission_id" required>
          <option value="">— 선택 —</option>
          {% for p in permissions|default([]) %}<option value="{{ p.id }}">{{ p.resource|default('') }}.{{ p.action|default('') }}</option>{% endfor %}
        </select>
      </div>
    </div>
    <div class="frow">
      <div class="fld"><label>유효 기한 (위임만)</label><input type="date" name="expires_at"></div>
      <div class="fld"><label>사유</label><input type="text" name="reason" placeholder="권한 부여 근거"></div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:10px;">
      <a class="btn btn-secondary" href="/admin/permissions">취소</a>
      <button class="btn btn-primary" type="submit">📤 부여</button>
    </div>
  </form>
  <div style="height: var(--space-7);"></div>
</main></div></body></html>
