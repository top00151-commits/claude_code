<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/><title>이슈 등록 · KNK</title>
{% include "_v5_partials/styles.html" %}
<style>
.form-card { margin: 0 var(--content-pad) var(--space-5); background: var(--paper-3); border: 1px solid var(--line); border-radius: var(--radius-xl); padding: var(--space-6); }
.field-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 14px; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field.full { grid-column: span 2; }
.field label { font-size: 12px; font-weight: 600; }
.field input, .field select, .field textarea { padding: 10px 14px; font-family: inherit; font-size: 13.5px; color: var(--ink); background: var(--paper); border: 1px solid var(--line); border-radius: var(--radius-md); }
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--amber); box-shadow: 0 0 0 3px var(--amber-glow); }
.field textarea { min-height: 100px; resize: vertical; }
</style></head>
<body>
<div class="app">{% include "_v5_partials/chrome.html" with context %}
<main class="main">
  <div class="page-head">
    <div><div class="crumbs"><a href="/issues">이슈·AS</a> · <b>새 이슈</b></div>
    <h1 class="page-title">새 <em>이슈</em> 등록</h1></div>
  </div>
  <form method="post" action="/issues/new">
    <div class="form-card">
      <div class="field-row">
        <div class="field"><label>유형 *</label><select name="issue_type" required><option value="">— 선택 —</option>{% for t in ISSUE_TYPES %}<option value="{{ t }}">{{ t }}</option>{% endfor %}</select></div>
        <div class="field"><label>심각도 *</label><select name="severity" required>{% for s in ISSUE_SEVERITIES %}<option value="{{ s }}" {% if s == '보통' %}selected{% endif %}>{{ s }}</option>{% endfor %}</select></div>
      </div>
      <div class="field-row">
        <div class="field full"><label>제목 *</label><input type="text" name="title" required placeholder="이슈 제목"></div>
      </div>
      <div class="field-row">
        <div class="field full"><label>상세 내용</label><textarea name="detail" placeholder="발생 상황 / 영향 / 원인 추정"></textarea></div>
      </div>
      <div class="field-row">
        <div class="field"><label>담당 팀</label><select name="owner_team_id"><option value="">— 자동 —</option>{% for t in teams %}<option value="{{ t.id }}">{{ t.name }}</option>{% endfor %}</select></div>
        <div class="field"><label>관련 프로젝트</label><select name="project_id"><option value="">— 없음 —</option>{% for p in projects %}<option value="{{ p.id }}" {% if p.id == default_project_id %}selected{% endif %}>{{ p.mgmt_code|default('') }} {{ p.name }}</option>{% endfor %}</select></div>
      </div>
      <div class="field-row">
        <div class="field"><label>관련 고객사</label><select name="customer_id"><option value="">— 없음 —</option>{% for c in customers %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select></div>
        <div class="field"><label>SLA (시간)</label><input type="number" name="sla_hours" placeholder="처리 시한 (h)" min="1"></div>
      </div>
    </div>
    <div style="margin: 0 var(--content-pad) var(--space-7);display:flex;justify-content:flex-end;gap:10px;">
      <a class="btn btn-secondary" href="/issues">취소</a>
      <button type="submit" class="btn btn-primary">📤 등록</button>
    </div>
  </form>
</main></div></body></html>
