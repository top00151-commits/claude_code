<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/><title>B/L 통관 · KNK</title>
{% include "_v5_partials/styles.html" %}
<style>
.form-card { margin: 0 var(--content-pad) var(--space-3); background: var(--paper-3); border: 1px solid var(--line); border-radius: var(--radius-xl); padding: var(--space-6); }
.frow { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; margin-bottom: 14px; }
.fld label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
.fld input, .fld select { width: 100%; padding: 10px 14px; font-size: 13.5px; border: 1px solid var(--line); border-radius: var(--radius-md); background: var(--paper); color: var(--ink); font-family: inherit; }
</style></head><body>
<div class="app">{% set active_tab = 'sales' %}
{% include "_v5_partials/chrome.html" with context %}
<main class="main">
  <div class="page-head">
    <div><div class="crumbs"><a href="/export">수출</a> · <a href="/export/orders/{{ eo.id }}">{{ eo.export_no }}</a> · <b>B/L 통관</b></div>
    <h1 class="page-title">🚢 B/L &amp; <em>통관</em></h1></div>
    <a class="btn btn-secondary" href="/export/orders/{{ eo.id }}">↩ 수출 상세</a>
  </div>

  <form method="post" action="/export/orders/{{ eo.id }}/bl" class="form-card">
    <h3 style="font-size:14px;font-weight:700;margin-bottom:14px;">선적 (B/L)</h3>
    <div class="frow">
      <div class="fld"><label>B/L 번호</label><input type="text" name="bl_no" value="{{ bl.bl_no|default('') }}"></div>
      <div class="fld"><label>발행일</label><input type="date" name="issued_at" value="{{ bl.issued_at|default(today) }}"></div>
    </div>
    <div class="frow">
      <div class="fld"><label>본선명</label><input type="text" name="vessel" value="{{ bl.vessel|default(eo.vessel|default('')) }}"></div>
      <div class="fld"><label>항차</label><input type="text" name="voyage" value="{{ bl.voyage|default('') }}"></div>
    </div>
    <div class="frow">
      <div class="fld"><label>출발항</label><input type="text" name="port_from" value="{{ bl.port_from|default('Busan, KR') }}"></div>
      <div class="fld"><label>도착항</label><input type="text" name="port_to" value="{{ bl.port_to|default(eo.destination|default('')) }}"></div>
    </div>
    <button class="btn btn-primary" type="submit">📤 B/L 저장</button>
  </form>

  <form method="post" action="/export/orders/{{ eo.id }}/customs" class="form-card">
    <h3 style="font-size:14px;font-weight:700;margin-bottom:14px;">통관 신고</h3>
    <div class="frow">
      <div class="fld"><label>신고번호</label><input type="text" name="declaration_no" value="{{ customs.declaration_no|default('') }}"></div>
      <div class="fld"><label>신고일</label><input type="date" name="declared_at" value="{{ customs.declared_at|default(today) }}"></div>
    </div>
    <div class="frow">
      <div class="fld"><label>신고금액 ({{ eo.currency|default('USD') }})</label><input type="number" name="declared_amount" step="0.01" value="{{ customs.declared_amount|default(ci_amount) }}"></div>
      <div class="fld"><label>HS 코드 (대표)</label><input type="text" name="hs_code" value="{{ customs.hs_code|default('') }}"></div>
    </div>
    <div class="frow">
      <div class="fld"><label>승인 상태</label>
        <select name="status">
          <option value="DRAFT" {% if customs.status == 'DRAFT' %}selected{% endif %}>작성 중</option>
          <option value="SUBMITTED" {% if customs.status == 'SUBMITTED' %}selected{% endif %}>제출</option>
          <option value="CLEARED" {% if customs.status == 'CLEARED' %}selected{% endif %}>통관 완료</option>
          <option value="REJECTED" {% if customs.status == 'REJECTED' %}selected{% endif %}>반려</option>
        </select>
      </div>
      <div class="fld"><label>관세사</label><input type="text" name="broker" value="{{ customs.broker|default('') }}"></div>
    </div>
    <button class="btn btn-primary" type="submit">📤 통관 저장</button>
  </form>
  <div style="height: var(--space-7);"></div>
</main></div></body></html>
