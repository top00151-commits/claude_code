<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/><title>FTA 증명서 작성 · KNK</title>
{% include "_v5_partials/styles.html" %}
<style>
/* v5H226z70: 시안1 토큰 — fta_form v1+v2 */
body {
  --qv-surface:#ffffff; --qv-surface-2:#f7f8fa; --qv-line:#eef0f4;
  --qv-ink:#0f172a; --qv-ink-2:#334155; --qv-ink-3:#64748b;
  --biz-t:#c2410c; --biz-m:#1e40af; --biz-e:#6d28d9; --biz-c:#047857;
}
@media (max-width:1100px){ .page-title{font-size:22px;} .frow{grid-template-columns:1fr !important;} .fld.full{grid-column:span 1 !important;} }
.form-card { margin: 0 var(--content-pad) var(--space-5); background: var(--paper-3); border: 1px solid var(--line); border-radius: var(--radius-xl); padding: var(--space-6); }
.frow { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; margin-bottom: 14px; }
.fld label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
.fld label .req { color: var(--knk-red); }
.fld input, .fld select, .fld textarea { width: 100%; padding: 10px 14px; font-size: 13.5px; border: 1px solid var(--line); border-radius: var(--radius-md); background: var(--paper); color: var(--ink); font-family: inherit; }
.fld textarea { min-height: 80px; resize: vertical; }
.fld.full { grid-column: span 2; }
</style></head><body>
<div class="app">{% set active_tab = 'sales' %}
{% include "_v5_partials/chrome.html" with context %}
<main class="main" data-dn="main" data-dn-tone="amber">
  <div class="page-head" data-dn="page-head">
    <div><div class="crumbs" data-dn="crumb"><a href="/fta/certificates">FTA</a> · <b>{% if cert %}수정{% else %}작성{% endif %}</b></div>
    <h1 class="page-title" data-dn="title">📜 FTA 증명서 <em>{% if cert %}수정{% else %}작성{% endif %}</em></h1></div>
  </div>

  <form method="post" action="{% if cert %}/fta/certificates/{{ cert.id }}/edit{% else %}/fta/certificates/new{% endif %}" class="form-card">
    <div class="frow">
      <div class="fld"><label>인증 번호</label><input type="text" name="cert_no" value="{{ cert.cert_no|default('') }}" placeholder="자동 생성"></div>
      <div class="fld"><label>FTA 협정 <span class="req">*</span></label>
        <select name="fta_type" required>
          <option value="">— 선택 —</option>
          <option>한-EU</option><option>한-미</option><option>한-아세안</option>
          <option>RCEP</option><option>한-중</option><option>한-베트남</option><option>기타</option>
        </select>
      </div>
    </div>
    <div class="frow">
      <div class="fld"><label>품목 (자재) <span class="req">*</span></label>
        <select name="part_id" required>
          <option value="">— 선택 —</option>
          {% for p in parts|default([]) %}<option value="{{ p.id }}">{{ p.name }}{% if p.spec %} · {{ p.spec }}{% endif %}</option>{% endfor %}
        </select>
      </div>
      <div class="fld"><label>HS 코드 <span class="req">*</span></label><input type="text" name="hs_code" required value="{{ cert.hs_code|default('') }}" placeholder="000000"></div>
    </div>
    <div class="frow">
      <div class="fld"><label>원산지 기준</label>
        <select name="origin_criteria">
          <option value="">— 선택 —</option>
          <option>WO (완전생산)</option>
          <option>PSR (품목별 기준)</option>
          <option>RVC (역내가치비율)</option>
          <option>CTC (세번변경기준)</option>
        </select>
      </div>
      <div class="fld"><label>RVC %</label><input type="number" name="rvc_percent" step="0.1" min="0" max="100" value="{{ cert.rvc_percent|default('') }}"></div>
    </div>
    <div class="frow">
      <div class="fld"><label>발행일</label><input type="date" name="issued_at" value="{{ cert.issued_at|default('') }}"></div>
      <div class="fld"><label>유효기한</label><input type="date" name="expires_at" value="{{ cert.expires_at|default('') }}"></div>
    </div>
    <div class="frow">
      <div class="fld full"><label>비고</label><textarea name="note" placeholder="원산지 입증 자료·근거">{{ cert.note|default('') }}</textarea></div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:10px;">
      <a class="btn btn-secondary" href="/fta/certificates">취소</a>
      <button class="btn btn-primary" type="submit">📤 저장</button>
    </div>
  </form>
  <div style="height: var(--space-7);"></div>
</main></div></body></html>
