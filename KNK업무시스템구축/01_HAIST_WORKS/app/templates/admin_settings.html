<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/><title>시스템 설정 · KNK</title>
{% include "_v5_partials/styles.html" %}
<style>
.cfg-form { margin: 0 var(--content-pad) var(--space-5); background: var(--paper-3); border: 1px solid var(--line); border-radius: var(--radius-xl); padding: var(--space-6); }
.fld { margin-bottom: 14px; display: grid; grid-template-columns: 200px 1fr; gap: 14px; align-items: center; }
.fld label { font-size: 12px; font-weight: 600; }
.fld input, .fld select { padding: 9px 12px; font-size: 13px; border: 1px solid var(--line); border-radius: var(--radius-md); background: var(--paper); color: var(--ink); font-family: inherit; }
</style></head><body>
<div class="app">{% include "_v5_partials/chrome.html" with context %}
<main class="main">
  <div class="page-head">
    <div><div class="crumbs"><a href="/admin">관리자</a> · <b>시스템 설정</b></div><h1 class="page-title">⚙ 시스템 <em>설정</em></h1>
    <div class="page-meta" style="margin-top:6px;letter-spacing:0;text-transform:none;font-size:12px;color:var(--mute);">알림·자동화·스케줄·권한 정책 등 전역 설정</div></div>
  </div>

  <form method="post" action="/admin/settings" class="cfg-form">
    {% for key, val in (settings or {}).items() %}
    <div class="fld">
      <label>{{ key }}</label>
      <input type="text" name="{{ key }}" value="{{ val }}">
    </div>
    {% else %}
    <div style="padding:30px;text-align:center;color:var(--mute);">설정 항목이 없습니다.</div>
    {% endfor %}
    {% if settings %}
    <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:14px;">
      <button class="btn btn-primary" type="submit">💾 저장</button>
    </div>
    {% endif %}
  </form>
  <div style="height: var(--space-7);"></div>
</main></div></body></html>
