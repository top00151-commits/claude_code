<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/><title>{% if supplier %}공급사 수정{% else %}공급사 등록{% endif %} · KNK</title>
{% include "_v5_partials/styles.html" %}
<style>
.form-card { margin: 0 var(--content-pad) var(--space-5); background: var(--paper-3); border: 1px solid var(--line); border-radius: var(--radius-xl); padding: var(--space-6); }
.field-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 14px; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field.full { grid-column: span 2; }
.field label { font-size: 12px; font-weight: 600; }
.field input, .field select, .field textarea { padding: 10px 14px; font-family: inherit; font-size: 13.5px; color: var(--ink); background: var(--paper); border: 1px solid var(--line); border-radius: var(--radius-md); }
.field input:focus, .field textarea:focus { outline: none; border-color: var(--amber); box-shadow: 0 0 0 3px var(--amber-glow); }
.field textarea { min-height: 70px; resize: vertical; }
</style></head>
<body>
<div class="app">{% include "_v5_partials/chrome.html" with context %}
<main class="main">
  <div class="page-head">
    <div><div class="crumbs"><a href="/suppliers">공급사</a> · <b>{% if supplier %}수정{% else %}등록{% endif %}</b></div>
    <h1 class="page-title">{% if supplier %}공급사 <em>수정</em>{% else %}공급사 <em>등록</em>{% endif %}</h1></div>
  </div>
  <form method="post" action="{% if supplier %}/suppliers/{{ supplier.id }}/edit{% else %}/suppliers/new{% endif %}">
    <div class="form-card">
      <div class="field-row">
        <div class="field full"><label>공급사명 *</label><input type="text" name="name" required value="{{ supplier.name|default('') }}"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>사업자번호</label><input type="text" name="business_no" value="{{ supplier.business_no|default('') }}" placeholder="000-00-00000"></div>
        <div class="field"><label>대표</label><input type="text" name="ceo_name" value="{{ supplier.ceo_name|default('') }}"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>담당자</label><input type="text" name="contact_person" value="{{ supplier.contact_person|default('') }}"></div>
        <div class="field"><label>전화</label><input type="text" name="phone" value="{{ supplier.phone|default('') }}" placeholder="010-0000-0000"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>이메일</label><input type="email" name="email" value="{{ supplier.email|default('') }}"></div>
        <div class="field"><label>결제 조건</label><input type="text" name="payment_terms" value="{{ supplier.payment_terms|default('') }}" placeholder="예: 60일 어음"></div>
      </div>
      <div class="field-row">
        <div class="field full"><label>주소</label><input type="text" name="address" value="{{ supplier.address|default('') }}"></div>
      </div>
      <div class="field-row">
        <div class="field full"><label>비고</label><textarea name="note" placeholder="공급사 특이사항">{{ supplier.note|default('') }}</textarea></div>
      </div>
      <div style="margin-top:10px;font-size:12px;color:var(--mute);"><label><input type="checkbox" name="is_active" value="1" {% if not supplier or supplier.is_active %}checked{% endif %}> 활성</label></div>
    </div>
    <div style="margin: 0 var(--content-pad) var(--space-7);display:flex;justify-content:flex-end;gap:10px;">
      <a class="btn btn-secondary" href="/suppliers">취소</a>
      <button type="submit" class="btn btn-primary">📤 {% if supplier %}저장{% else %}등록{% endif %}</button>
    </div>
  </form>
</main></div></body></html>
