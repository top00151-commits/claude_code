<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/><title>{% if change %}변경 수정{% else %}변경 등록{% endif %} · KNK</title>
{% include "_v5_partials/styles.html" %}
<style>
.form-card { margin: 0 var(--content-pad) var(--space-5); background: var(--paper-3); border: 1px solid var(--line); border-radius: var(--radius-xl); padding: var(--space-6); }
.field-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 14px; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field.full { grid-column: span 2; }
.field label { font-size: 12px; font-weight: 600; }
.field label .req { color: var(--knk-red); }
.field input, .field select, .field textarea { padding: 10px 14px; font-family: inherit; font-size: 13.5px; color: var(--ink); background: var(--paper); border: 1px solid var(--line); border-radius: var(--radius-md); }
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--amber); box-shadow: 0 0 0 3px var(--amber-glow); }
.field textarea { min-height: 100px; resize: vertical; }
</style></head>
<body>
<div class="app">{% include "_v5_partials/chrome.html" with context %}
<main class="main">
  <div class="page-head">
    <div><div class="crumbs"><a href="/changes">변경 공지</a> · <b>{% if change %}수정{% else %}새 변경{% endif %}</b></div>
    <h1 class="page-title">{% if change %}변경 #{{ change.id }} 수정{% else %}새 <em>변경</em> 등록{% endif %}</h1></div>
  </div>
  <form method="post" action="{% if change %}/changes/{{ change.id }}/edit{% else %}/changes/new{% endif %}">
    <div class="form-card">
      <div class="field-row">
        <div class="field"><label>유형 <span class="req">*</span></label><select name="change_type" required><option value="">— 선택 —</option>{% for t in CHANGE_TYPES %}<option value="{{ t }}" {% if change and change.change_type == t %}selected{% endif %}>{{ t }}</option>{% endfor %}</select></div>
        <div class="field"><label>긴급도 <span class="req">*</span></label><select name="urgency" required>{% for u_ in CHANGE_URGENCIES %}<option value="{{ u_ }}" {% if (change and change.urgency == u_) or (not change and u_ == '보통') %}selected{% endif %}>{{ u_ }}</option>{% endfor %}</select></div>
      </div>
      <div class="field-row">
        <div class="field full"><label>제목 <span class="req">*</span></label><input type="text" name="title" required value="{{ change.title|default('') }}" placeholder="변경 사항을 한 줄로"></div>
      </div>
      <div class="field-row">
        <div class="field full"><label>요약</label><input type="text" name="summary" value="{{ change.summary|default('') }}" placeholder="짧은 요약"></div>
      </div>
      <div class="field-row">
        <div class="field full"><label>상세 내용</label><textarea name="body" placeholder="변경 사항 상세 / 영향 범위 / 조치 사항">{{ change.body|default('') }}</textarea></div>
      </div>
      <div class="field-row">
        <div class="field"><label>출처</label><select name="source"><option value="">— 선택 —</option>{% for s in CHANGE_SOURCES %}<option value="{{ s }}" {% if change and change.source == s %}selected{% endif %}>{{ s }}</option>{% endfor %}</select></div>
        <div class="field"><label>관련 프로젝트</label><select name="project_id"><option value="">— 없음 —</option>{% for p in projects %}<option value="{{ p.id }}" {% if change and change.project_id == p.id %}selected{% endif %}>{{ p.mgmt_code|default('') }} {{ p.name }}</option>{% endfor %}</select></div>
      </div>
    </div>
    <div style="margin: 0 var(--content-pad) var(--space-7);display:flex;justify-content:flex-end;gap:10px;">
      <a class="btn btn-secondary" href="/changes">취소</a>
      <button type="submit" class="btn btn-primary">📤 {% if change %}저장{% else %}등록{% endif %}</button>
    </div>
  </form>
</main></div></body></html>
