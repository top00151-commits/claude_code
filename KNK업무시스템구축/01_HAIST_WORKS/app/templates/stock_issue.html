<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/><title>출고 등록 · KNK</title>
{% include "_v5_partials/styles.html" %}
<style>
.form-card { margin: 0 var(--content-pad) var(--space-5); background: var(--paper-3); border: 1px solid var(--line); border-radius: var(--radius-xl); padding: var(--space-6); }
.frow { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; margin-bottom: 14px; }
.fld label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
.fld label .req { color: var(--knk-red); }
.fld input, .fld select, .fld textarea { width: 100%; padding: 10px 14px; font-size: 13.5px; border: 1px solid var(--line); border-radius: var(--radius-md); background: var(--paper); color: var(--ink); font-family: inherit; }
.fld textarea { min-height: 80px; resize: vertical; }
.fld.full { grid-column: span 2; }
</style></head><body>
<div class="app">{% set active_tab = 'logi' %}
{% include "_v5_partials/chrome.html" with context %}
<main class="main">
  <div class="page-head">
    <div><div class="crumbs"><a href="/logistics">자재구매센터</a> · <b>출고 등록</b></div><h1 class="page-title">📤 출고 <em>등록</em></h1>
    <div class="page-meta" style="margin-top:6px;letter-spacing:0;text-transform:none;font-size:12px;color:var(--mute);">자재 → 현장 출고 + 프로젝트/고객사 연결</div></div>
    <a class="btn btn-secondary" href="/stock/issues">📜 출고 이력</a>
  </div>

  <form method="post" action="/stock/issue" class="form-card">
    <div class="frow">
      <div class="fld"><label>자재 <span class="req">*</span></label>
        <select name="part_id" required>
          <option value="">— 선택 —</option>
          {% for p in parts %}<option value="{{ p.id }}" {% if p.id == default_part_id %}selected{% endif %}>{{ p.code }} · {{ p.name }} (재고 {{ p.stock_qty|default(0) }})</option>{% endfor %}
        </select>
      </div>
      <div class="fld"><label>출고 수량 <span class="req">*</span></label><input type="number" name="qty" step="0.01" min="0.01" required></div>
    </div>
    <div class="frow">
      <div class="fld"><label>관리코드 / 프로젝트</label>
        <select name="project_id">
          <option value="">— 없음 —</option>
          {% for p in projects %}<option value="{{ p.id }}">{{ p.mgmt_code|default('') }} {{ p.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="fld"><label>고객사</label>
        <select name="customer_id">
          <option value="">— 없음 —</option>
          {% for c in customers %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
        </select>
      </div>
    </div>
    <div class="frow">
      <div class="fld"><label>출고 유형</label>
        <select name="purpose">
          <option value="PRODUCTION">생산 투입</option>
          <option value="SALE">판매·납품</option>
          <option value="SAMPLE">샘플</option>
          <option value="OTHER">기타</option>
        </select>
      </div>
      <div class="fld"><label>출고일</label><input type="date" name="issued_at" value="{{ today|default('') }}"></div>
    </div>
    <div class="frow">
      <div class="fld full"><label>비고</label><textarea name="note" placeholder="출고 사유·인수자·후속 조치"></textarea></div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:10px;">
      <a class="btn btn-secondary" href="/stock/issues">취소</a>
      <button class="btn btn-primary" type="submit">📤 출고 등록</button>
    </div>
  </form>
  <div style="height: var(--space-7);"></div>
</main></div></body></html>
