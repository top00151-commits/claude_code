<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/><title>P/L 작성 · KNK</title>
{% include "_v5_partials/styles.html" %}
<style>
.form-card { margin: 0 var(--content-pad) var(--space-5); background: var(--paper-3); border: 1px solid var(--line); border-radius: var(--radius-xl); padding: var(--space-6); }
.frow { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-bottom: 14px; }
.fld label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
.fld input { width: 100%; padding: 10px 14px; font-size: 13.5px; border: 1px solid var(--line); border-radius: var(--radius-md); background: var(--paper); color: var(--ink); font-family: inherit; }
</style></head><body>
<div class="app">{% include "_v5_partials/chrome.html" with context %}
<main class="main">
  <div class="page-head">
    <div><div class="crumbs"><a href="/export">수출</a> · <a href="/export/orders/{{ eo.id }}">{{ eo.export_no }}</a> · <b>P/L</b></div>
    <h1 class="page-title">📦 Packing <em>List</em></h1></div>
    <a class="btn btn-secondary" href="/export/orders/{{ eo.id }}">↩ 수출 상세</a>
  </div>

  <form method="post" action="/export/orders/{{ eo.id }}/pl" class="form-card">
    <div class="frow">
      <div class="fld"><label>P/L 번호</label><input type="text" name="pl_no" placeholder="자동 생성"></div>
      <div class="fld"><label>총 박스 수</label><input type="number" name="total_boxes" min="0"></div>
      <div class="fld"><label>총 중량 (kg)</label><input type="number" name="total_weight" step="0.01" min="0"></div>
    </div>
    <div class="frow">
      <div class="fld"><label>총 부피 (CBM)</label><input type="number" name="total_cbm" step="0.001" min="0"></div>
      <div class="fld"><label>포장 단위</label><input type="text" name="package_type" placeholder="Carton, Pallet"></div>
      <div class="fld"><label>마크</label><input type="text" name="marks" placeholder="MS-001 / NO.1-50"></div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:10px;">
      <a class="btn btn-secondary" href="/export/orders/{{ eo.id }}">취소</a>
      <button class="btn btn-primary" type="submit">📤 P/L 발행</button>
    </div>
  </form>
  <div style="height: var(--space-7);"></div>
</main></div></body></html>
