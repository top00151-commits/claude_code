<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/><title>팀 게시판 선택 · KNK</title>
{% include "_v5_partials/styles.html" %}
</head><body>
<div class="app">{% include "_v5_partials/chrome.html" with context %}
<main class="main">
  <div class="page-head">
    <div><div class="page-meta">팀 게시판</div><h1 class="page-title">📋 팀 <em>게시판</em></h1>
    <div class="page-meta" style="margin-top:6px;letter-spacing:0;text-transform:none;font-size:12px;color:var(--mute);">접근 가능한 팀 게시판 목록</div></div>
  </div>

  <div class="actions" style="margin: 0 var(--content-pad);grid-template-columns:repeat(3,1fr);gap:var(--space-3);display:grid;">
    {% for t in teams %}
    <a class="action-card" href="/board/team/{{ t.id }}" style="background:var(--paper-3);border:1px solid var(--line);border-radius:var(--radius-md);padding:var(--space-4);display:flex;align-items:center;gap:var(--space-3);text-decoration:none;color:inherit;">
      <div style="width:42px;height:42px;background:var(--amber-glow);border-radius:var(--radius-md);display:grid;place-items:center;font-size:22px;">📋</div>
      <div style="flex:1;">
        <h4 style="font-size:13px;font-weight:700;color:var(--ink);">{{ t.name }}</h4>
        <p style="font-size:11px;color:var(--mute);margin-top:2px;">{{ t.post_count|default(0) }} 게시글{% if t.unread %} · <b style="color:var(--knk-red);">{{ t.unread }} 신규</b>{% endif %}</p>
      </div>
      <div style="color:var(--amber-deep);font-weight:700;">→</div>
    </a>
    {% else %}<div class="card empty" style="grid-column: 1/-1;"><div class="ico">📋</div><div class="ttl">접근 가능한 팀 게시판 없음</div></div>{% endfor %}
  </div>
  <div style="height: var(--space-7);"></div>
</main></div></body></html>
